
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preventive Maintenance Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'status-pending': '#FBBF24', // amber-400
            'status-in-progress': '#3B82F6', // blue-500
            'status-awaiting-confirmation': '#A855F7', // purple-500 (Used for Awaiting Supervisor Confirmation)
            'status-awaiting-manager-confirmation': '#14B8A6', // teal-500 (New for Awaiting Manager Confirmation)
            'status-completed': '#10B981', // emerald-500
          }
        }
      }
    }
  </script>
<script type="importmap">
